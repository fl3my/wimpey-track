services:
  wimpeytrack-api:
    image: ghcr.io/fl3my/wimpeytrack-api:latest
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - AzureDocumentIntelligence__EndPoint=${AZURE_DOCUMENT_ENDPOINT}
      - AzureDocumentIntelligence__ApiKey=${AZURE_DOCUMENT_APIKEY}
    restart: unless-stopped
    volumes:
      - wimpeytrack-db:/app/data
      - wimpeytrack-uploads:/app/wwwroot/uploads
      - wimpeytrack-reports:/app/wwwroot/reports
  
  document-vision-service:
    image: ghcr.io/fl3my/document-vision-service:latest
    depends_on:
      - wimpeytrack-api
    restart: unless-stopped

  osrm-backend:
    image: ghcr.io/project-osrm/osrm-backend:latest
    volumes:
      - /opt/osrm/scotland-osrm:/data:ro
    command: osrm-routed --algorithm mld /data/scotland-latest.osrm
    restart: unless-stopped

volumes:
  wimpeytrack-db:
  wimpeytrack-uploads:
  wimpeytrack-reports:
    
networks:
  proxy:
    external: true