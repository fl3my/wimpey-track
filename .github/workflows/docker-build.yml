name: Build and push Docker images

on:
  push:
    branches:
      - main

permissions: 
  contents: read
  packages: write
  
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Github Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.action}}
          password: ${{secrets.GITHUB_TOKEN }}
      
      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: ./backend/WimpeyTrack.Api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/wimpeytrack-api:latest
          
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/wimpeytrack-frontend:latest
        
      - name: Build and push document vision service
        uses: docker/build-push-action@v6
        with:
          context: ./document-vision-service
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/document-vision-service:latest




          