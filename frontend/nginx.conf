server {
    listen 80;
    
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location /api/ {
        proxy_pass http://wimpeytrack-api:8080/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /uploads/ {
            proxy_pass http://wimpeytrack-api:8080/uploads/;
            proxy_set_header Host $host;
            proxy_buffering off;
        }

    location /reports/ {
            proxy_pass http://wimpeytrack-api:8080/reports/;
            proxy_set_header Host $host;
            proxy_buffering off;
        }
}