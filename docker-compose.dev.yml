services:
  wimpeytrack-api:
    build:
      context: .
      dockerfile: backend/WimpeyTrack.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - AzureDocumentIntelligence__EndPoint=${AZURE_DOCUMENT_ENDPOINT}
      - AzureDocumentIntelligence__ApiKey=${AZURE_DOCUMENT_APIKEY}
      - Gmail__ClientId=${GMAIL_CLIENT_ID}
      - Gmail__ClientSecret=${GMAIL_CLIENT_SECRET}
      - Gmail__RefreshToken=${GMAIL_REFRESH_TOKEN}
      - Gmail__ClientEmail=${GMAIL_CLIENT_EMAIL}
    ports:
      - "5002:8080"
    volumes:
      - ./data/db:/app/data
      - ./data/uploads:/app/wwwroot/uploads
      - ./data/reports:/app/wwwroot/reports
      - ./data/tiles:/app/wwwroot/tiles
  
  document-vision-service:
    build:
      context: ./document-vision-service
    ports:
      - "5003:80"

  osrm-backend:
    image: ghcr.io/project-osrm/osrm-backend:latest
    volumes:
      - ./data/osrm/scotland:/data
    command: osrm-routed --algorithm mld /data/scotland-latest.osrm
    restart: unless-stopped