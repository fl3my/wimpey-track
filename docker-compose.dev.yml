services:
  wimpeytrack-api:
    build:
      context: .
      dockerfile: backend/WimpeyTrack.Api/Dockerfile
    container_name: wimpeytrack-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - AzureDocumentIntelligence__EndPoint=${AZURE_DOCUMENT_ENDPOINT}
      - AzureDocumentIntelligence__ApiKey=${AZURE_DOCUMENT_APIKEY}
    ports:
      - "5002:8080"
    volumes:
      - ./data/db:/app/data
      - ./data/uploads:/app/wwwroot/uploads
      - ./data/reports:/app/wwwroot/reports
  
  document-vision-service:
    build:
      context: ./document-vision-service
    ports:
      - "5003:80"

  osrm-backend:
    image: ghcr.io/project-osrm/osrm-backend:latest
    volumes:
      - ./osrm/scotland:/data
    command: osrm-routed --algorithm mld /data/scotland-latest.osrm
    restart: unless-stopped

volumes:
  wimpeytrack-db:
  wimpeytrack-uploads:
  wimpeytrack-reports: